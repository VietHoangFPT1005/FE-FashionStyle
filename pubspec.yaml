name: flutterfashion
description: "FashionStyle - E-commerce Fashion App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ===== Network =====
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  http: ^1.2.2

  # ===== SignalR (CHAT SUPPORT - MỚI THÊM) =====
  signalr_netcore: ^1.4.4

  # ===== State Management =====
  provider: ^6.1.2

  # ===== Local Storage =====
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.3

  # ===== Map - OpenStreetMap =====
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # ===== Location / GPS =====
  geolocator: ^13.0.2

  # ===== Image =====
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0

  # ===== Charts =====
  fl_chart: ^0.69.0

  # ===== UI / UX =====
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  badges: ^3.1.2
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_rating_bar: ^4.0.1
  pull_to_refresh_flutter3: ^2.0.2
  fluttertoast: ^8.2.8
  flutter_spinkit: ^5.2.1
  lottie: ^3.3.1

  # ===== Google Sign-In =====
  google_sign_in: ^6.2.2

  # ===== URL =====
  url_launcher: ^6.3.1

  # ===== Notifications =====
  flutter_local_notifications: ^18.0.0

  # ===== Utils =====
  intl: ^0.19.0
  timeago: ^3.7.0
  connectivity_plus: ^6.1.0

  # ===== Geocoding (for OSM address reverse geocoding) =====
  geocoding: ^3.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
